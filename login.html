<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakeControl - Inloggen</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra styles speciaal om het inlogscherm mooi in het midden te zetten */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f7fb;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .login-box h2 { margin-bottom: 20px; color: #1e293b; }
        .login-box input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
        }
        .login-box button { width: 100%; padding: 12px; font-size: 16px; }
        .avatar-selection { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; font-size: 24px; }
        .avatar-option { cursor: pointer; padding: 5px; border-radius: 5px; border: 2px solid transparent; }
        .avatar-option.selected { border-color: #3b82f6; background: #e2e8f0; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-box">
            <h2>TakeControl 🤝</h2>
            <p>Kies een naam en wachtwoord om te starten!</p>
            
            <input type="text" id="username" placeholder="Gebruikersnaam" required>
            <input type="password" id="password" placeholder="Wachtwoord" required>
            
            <p style="font-size: 14px; color: #64748b; margin-bottom: 5px;">Kies je avatar:</p>
            <div class="avatar-selection">
                <span class="avatar-option selected" onclick="selectAvatar(this, '😎')">😎</span>
                <span class="avatar-option" onclick="selectAvatar(this, '🐱')">🐱</span>
                <span class="avatar-option" onclick="selectAvatar(this, '🦊')">🦊</span>
                <span class="avatar-option" onclick="selectAvatar(this, '🚀')">🚀</span>
            </div>

            <button class="btn-primary" id="login-btn">Starten & Inloggen</button>
        </div>
    </div>

    <script>
        let gekozenAvatar = "😎";

        function selectAvatar(element, avatar) {
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            gekozenAvatar = avatar;
        }

        document.getElementById('login-btn').addEventListener('click', () => {
            const naam = document.getElementById('username').value;
            const wachtwoord = document.getElementById('password').value;

            if (naam.trim() === "" || wachtwoord.trim() === "") {
                alert("Vul wel even een naam en wachtwoord in!");
                return;
            }

            // Sla de ingelogde gebruiker op in de browser
            localStorage.setItem('ingelogdeGebruiker', naam);
            localStorage.setItem('gebruikerAvatar', gekozenAvatar);

            // Stuur door naar het dashboard!
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
