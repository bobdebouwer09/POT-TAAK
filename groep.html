<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakeControl - Groep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1 id="groeps-titel">Groep laden... 🚀</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-action" style="padding: 4px 10px; font-size: 12px;" onclick="pasGroepsNaamAan()">✏️ Naam wijzigen</button>
            <button class="btn-action" style="padding: 4px 10px; font-size: 12px; background-color: var(--color-red) !important; color: white !important; border: none !important;" onclick="window.location.href='index.html'">⬅ Terug</button>
        </div>
    </nav>

    <main class="container">

        <div class="widget-box members-box">
            <div class="members-title">Groepsleden</div>
            <div class="members-list" id="groeps-leden-lijst"></div>
            <button class="btn-action" style="margin-top: 12px; padding: 6px 14px; font-size: 13px;" onclick="voegExtraLidToe()">➕ Lid toevoegen</button>
        </div>

        <div class="tabs-container">
            <button class="tab-navigation-btn active" onclick="schakelTabblad('tab-taken', this)">📋 Taken</button>
            <button class="tab-navigation-btn" id="geld-tab-knop" onclick="schakelTabblad('tab-geld', this)">💰 Geld</button>
            <button class="tab-navigation-btn" onclick="schakelTabblad('tab-chat', this)">💬 Chat</button>
            <button class="tab-navigation-btn" onclick="schakelTabblad('tab-random', this)">🎲 Random</button>
        </div>

        <!-- TAKEN TAB -->
        <div class="tab-pane active" id="tab-taken">
            <div class="add-task-form">
                <h3 style="margin-top:0;">➕ Nieuwe Taak</h3>
                <div class="inline-form">
                    <input type="text" id="task-title" placeholder="Titel van de taak">
                    <input type="text" id="task-who" placeholder="Wie? (leeg = Iedereen)">
                    <input type="date" id="task-date">
                    <input type="number" id="task-reward" placeholder="€ Beloning" step="0.01" min="0" style="width:100px;">
                    <select id="task-status">
                        <option value="todo">Te doen</option>
                        <option value="doing">Mee bezig</option>
                        <option value="done">Klaar</option>
                    </select>
                    <button onclick="voegTaakToe()">Toevoegen</button>
                </div>
            </div>

            <div class="board-vertical">
                <div class="status-block">
                    <h4 class="status-todo">🔴 Te doen</h4>
                    <div id="todo-tasks"></div>
                </div>
                <div class="status-block">
                    <h4 class="status-doing">🟠 Mee bezig</h4>
                    <div id="doing-tasks"></div>
                </div>
                <div class="status-block">
                    <h4 class="status-done">🟢 Klaar</h4>
                    <div id="done-tasks"></div>
                </div>
            </div>
        </div>

        <!-- GELD TAB -->
        <div class="tab-pane" id="tab-geld" style="display:none;">
            <div class="widget-box">
                <h3 style="margin-top:0;">💰 Overzicht per persoon</h3>
                <table class="money-table">
                    <thead>
                        <tr><th>Naam</th><th>Verdiend</th><th>Schuld</th><th>Netto</th></tr>
                    </thead>
                    <tbody id="hoofd-geld-tabel-body"></tbody>
                </table>
            </div>

            <div class="widget-box">
                <h3 style="margin-top:0;">➕ Schuld toevoegen</h3>
                <button class="btn-action" onclick="openSchuldPopUp()">Nieuwe schuld invoeren</button>

                <table class="money-table" style="margin-top:20px;">
                    <thead>
                        <tr><th>Wie</th><th>Reden</th><th>Bedrag</th><th>Actie</th></tr>
                    </thead>
                    <tbody id="schulden-tabel-body"></tbody>
                </table>
            </div>
        </div>

        <!-- CHAT TAB -->
        <div class="tab-pane" id="tab-chat" style="display:none;">
            <div class="widget-box">
                <h3 style="margin-top:0;">💬 Groepschat</h3>
                <div class="chat-box" id="chat-berichten"></div>
                <div class="chat-input-row">
                    <input type="text" id="chat-input" placeholder="Typ een bericht..." onkeydown="if(event.key==='Enter') stuurBericht()">
                    <button class="btn-action" onclick="stuurBericht()">Verstuur</button>
                </div>
                <p style="color: var(--text-muted); font-size: 12px; margin-top: 10px;">⚠️ Chatberichten worden nog niet opgeslagen en verdwijnen bij het verversen van de pagina.</p>
            </div>
        </div>

        <!-- RANDOM TAB -->
        <div class="tab-pane" id="tab-random" style="display:none;">
            <div class="widget-box" style="text-align:center;">
                <h3 style="margin-top:0;">🎲 Wie moet het doen?</h3>
                <button class="btn-action" onclick="kiesWillekeurigPersoon()">Kies iemand willekeurig</button>
                <div class="randomizer-result" id="random-resultaat"></div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

    <script>
        // schakelTabblad() in script.js schakelt alleen de 'active' class.
        // De losse tabs starten verborgen via inline style, dus we wrappen
        // de functie zodat display en class-toggling gelijk lopen.
        document.querySelectorAll('.tab-pane').forEach(pane => {
            if (!pane.classList.contains('active')) pane.style.display = 'none';
        });

        const origSchakel = schakelTabblad;
        schakelTabblad = function(tabId, knop) {
            document.querySelectorAll('.tab-pane').forEach(pane => pane.style.display = 'none');
            origSchakel(tabId, knop);
            document.getElementById(tabId).style.display = 'block';
        };
    </script>
</body>
</html>
